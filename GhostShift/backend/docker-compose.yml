services:
  ghostshift:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_PRICE_PLUS: "${STRIPE_PRICE_PLUS}"
      STRIPE_PRICE_FAMILY: "${STRIPE_PRICE_FAMILY}"
