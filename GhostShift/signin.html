<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in | GhostShift</title>
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/ghostshift-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="site-body auth-page">
    <main class="auth-clean-shell">
      <a href="./index.html" class="auth-logo">
        <span class="zap-mark"><svg viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z" /></svg></span>
        <span>GhostShift</span>
      </a>
      <section class="auth-clean-card">
        <h1>Welcome back</h1>
        <p>Sign in to your GhostShift account.</p>
        <form id="signinForm" novalidate>
          <label>
            Email
            <input id="signinEmail" type="email" autocomplete="email" required placeholder="you@example.com" />
          </label>
          <label>
            Password
            <input id="signinPassword" type="password" autocomplete="current-password" required placeholder="Your password" />
          </label>
          <div class="form-error" id="signinError" hidden>Incorrect email or password. Please try again.</div>
          <button class="blue-button full" type="submit">Sign In</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="./signup.html">Sign up free</a></p>
      </section>
    </main>
    <script src="./account.js"></script>
  </body>
</html>
